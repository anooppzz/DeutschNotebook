<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DKS Tests</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
  <div class="app-root">
    <h2>DKS Tests</h2>
    <div id="out"></div>
  </div>
  <script type="module">
    async function runSpec(path, label) {
      try {
        const mod = await import(path);
        await mod.run();
      } catch (err) {
        const out = document.getElementById('out');
        const p = document.createElement('div');
        p.textContent = `FAILED: ${label}: ${err.message}`;
        p.style.color = 'red';
        out.appendChild(p);
      }
    }
    await runSpec('./storage.spec.js', 'storage.spec.js');
    await runSpec('./validator.spec.js', 'validator.spec.js');
    await runSpec('./review.spec.js', 'review.spec.js');
  </script>
</body>
</html>
