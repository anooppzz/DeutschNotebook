<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DKS Tests</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
  <div class="app-root">
    <h2>DKS Tests</h2>
    <div id="out"></div>
  </div>
  <script type="module">
    async function loadSpec(path) {
      try {
        await import(path);
      } catch (err) {
        const out = document.getElementById('out');
        const p = document.createElement('div');
        p.textContent = `FAILED TO LOAD ${path}: ${err.message}`;
        p.style.color = 'red';
        out.appendChild(p);
      }
    }
    await loadSpec('./storage.spec.js');
    await loadSpec('./validator.spec.js');
    await loadSpec('./review.spec.js');
  </script>
</body>
</html>
